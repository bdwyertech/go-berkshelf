name: Go
on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    strategy:
      matrix:
        go: ['1.26']
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    container: golang:${{ matrix.go }}
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Test
        env:
          GOFLAGS: '-mod=vendor'
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          go fmt $(go list ./... | grep -v /vendor/) | xargs -I {} -r /bin/sh -c "/bin/echo {} && exit 1"
          go vet $(go list ./... | grep -v /vendor/)
          go test -v -race $(go list ./... | grep -v /vendor/)

      - name: Static Analysis
        uses: dominikh/staticcheck-action@v1
        with:
          version: 'latest'

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Mise
        uses: jdx/mise-action@v4
        with:
          install: true
          working_directory: test/harness

      - name: Install Taskfile
        uses: go-task/setup-task@v2

      - name: Cache Bundler gems
        uses: actions/cache@v5
        with:
          path: test/harness/vendor/bundle
          key: bundler-${{ runner.os }}-${{ hashFiles('test/harness/Gemfile.lock') }}
          restore-keys: |
            bundler-${{ runner.os }}-

      - name: Setup harness dependencies
        working-directory: test/harness
        run: |
          bundle config set --local path vendor/bundle
          task setup
        env:
          BUNDLE_PATH: vendor/bundle

      - name: Build Go binary
        working-directory: test/harness
        run: task build

      - name: Run conformance tests
        working-directory: test/harness
        run: task conformance

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      packages: write
      id-token: write # Required for provenance metadata
      attestations: write
      security-events: write # For Scan results
    container: golang:1.24
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Git Info
        id: git
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          echo "SOURCE_NAME=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
          echo "SOURCE_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "SOURCE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_NAME: ${{ steps.git.outputs.SOURCE_NAME }}
          SOURCE_BRANCH: ${{ steps.git.outputs.SOURCE_BRANCH }}
          SOURCE_TAG: ${{ steps.git.outputs.SOURCE_TAG }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: './dist/*'
